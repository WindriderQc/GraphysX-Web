name: CI

on:
  pull_request:
  push:
    # Pushes to main are verified by the `verify` job in deploy.yml, which gates the
    # production release on this same workflow. Skipping main here avoids a duplicate run.
    branches-ignore:
      - main
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # On a PR branch, a newer push makes the old gate moot — cancel it. On main this
  # workflow is the deploy gate (called from deploy.yml), and a push must never cancel
  # the in-flight gate of the previous push: that gate is the only thing that would have
  # surfaced a broken main, and rapid pushes were killing it before it could go red.
  # Observed: four consecutive main pushes, zero completed gates, production stuck on a
  # commit from the day before while everyone believed newer work had shipped.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  verify:
    name: Typecheck, build, headless smokes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for headless smokes
        run: npx playwright install --with-deps chromium

      # Typecheck + production build, then drive the built output through every product
      # route in a real browser: default showroom, ?host=standalone (agent API + editor),
      # and ?host=legacy. Fails on any console or page error.
      - name: Verify release
        run: npm run verify

      - name: Upload smoke screenshots
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: verify-screenshots-${{ github.sha }}
          path: output/verify
          if-no-files-found: warn
          retention-days: 7
